name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'

env:
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  # ── Build all service images in parallel ──────────────────────────────────
  build-images:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: type-check
    strategy:
      matrix:
        service:
          - { name: gateway,          dockerfile: apps/gateway/Dockerfile,          tag: crm-gateway          }
          - { name: svc-auth,         dockerfile: apps/svc-auth/Dockerfile,         tag: crm-svc-auth         }
          - { name: svc-properties,   dockerfile: apps/svc-properties/Dockerfile,   tag: crm-svc-properties   }
          - { name: svc-demands,      dockerfile: apps/svc-demands/Dockerfile,      tag: crm-svc-demands      }
          - { name: svc-deals,        dockerfile: apps/svc-deals/Dockerfile,        tag: crm-svc-deals        }
          - { name: svc-matching,     dockerfile: apps/svc-matching/Dockerfile,     tag: crm-svc-matching     }
          - { name: svc-notifications,dockerfile: apps/svc-notifications/Dockerfile,tag: crm-svc-notifications}
          - { name: web,              dockerfile: apps/web/Dockerfile,              tag: crm-web              }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
          tags: |
            ${{ secrets.DOCKER_HUB_USER }}/${{ matrix.service.tag }}:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USER }}/${{ matrix.service.tag }}:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/crm
            git pull origin main
            export DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USER }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull gateway svc-auth svc-properties svc-demands svc-deals svc-matching svc-notifications web
            docker compose up -d --no-deps gateway svc-auth svc-properties svc-demands svc-deals svc-matching svc-notifications web
            docker compose exec svc-auth node dist/database/migrate.js
            docker image prune -f
            echo "✓ Deploy complete: ${{ github.sha }}"
