version: '3.9'

# ── Common environment for all NestJS microservices ────────────────────────────
x-svc-env: &svc-env
  DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_secret}@postgres:5432/${POSTGRES_DB:-crm_db}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
  MEILI_HOST: http://meilisearch:7700
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilisearch_dev_key}
  IMGPROXY_BASE_URL: http://imgproxy:8080
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@localhost}
  PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

x-svc-depends: &svc-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: crm_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilisearch_dev_key}
      MEILI_ENV: development
      MEILI_DB_PATH: /meili_data
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: crm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: crm_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_secret_123};
      mc mb --ignore-existing local/crm-photos;
      mc mb --ignore-existing local/crm-pdfs;
      mc mb --ignore-existing local/crm-avatars;
      mc anonymous set download local/crm-photos;
      exit 0;
      "

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: crm_imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_KEY: ${IMGPROXY_KEY:-68656c6c6f776f726c6468656c6c6f776f726c6468656c6c6f776f726c6468656c}
      IMGPROXY_SALT: ${IMGPROXY_SALT:-73616c74696e6773616c74696e6773616c74696e6773616c74696e6773616c7469}
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_JPEG_PROGRESSIVE: "true"
      IMGPROXY_USE_S3: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio_admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
      IMGPROXY_S3_ENDPOINT: http://minio:9000
    ports:
      - "8080:8080"
    depends_on:
      minio:
        condition: service_healthy

  # ── Microservices (dev: source-mounted, hot-reload) ────────────────────────
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: crm_gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      <<: *svc-env
      PORT: 3001
      WEB_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

  svc-auth:
    build:
      context: .
      dockerfile: apps/svc-auth/Dockerfile
    container_name: crm_svc_auth
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

  svc-properties:
    build:
      context: .
      dockerfile: apps/svc-properties/Dockerfile
    container_name: crm_svc_properties
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy

  svc-demands:
    build:
      context: .
      dockerfile: apps/svc-demands/Dockerfile
    container_name: crm_svc_demands
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

  svc-deals:
    build:
      context: .
      dockerfile: apps/svc-deals/Dockerfile
    container_name: crm_svc_deals
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

  svc-matching:
    build:
      context: .
      dockerfile: apps/svc-matching/Dockerfile
    container_name: crm_svc_matching
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

  svc-notifications:
    build:
      context: .
      dockerfile: apps/svc-notifications/Dockerfile
    container_name: crm_svc_notifications
    restart: unless-stopped
    environment:
      <<: *svc-env
      NODE_ENV: development
    depends_on:
      <<: *svc-depends

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
