version: '3.9'

x-svc-env: &svc-env
  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MEILI_HOST: http://meilisearch:7700
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
  IMGPROXY_BASE_URL: http://imgproxy:8080
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
  VAPID_SUBJECT: ${VAPID_SUBJECT}
  PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
  NODE_ENV: production

x-svc-depends: &svc-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-svc-network: &svc-network
  networks:
    - crm_internal

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    <<: *svc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    <<: *svc-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: crm_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_DB_PATH: /meili_data
    volumes:
      - meilisearch_data:/meili_data
    <<: *svc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: crm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    <<: *svc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: crm_minio_init
    depends_on:
      minio:
        condition: service_healthy
    <<: *svc-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/crm-photos;
      mc mb --ignore-existing local/crm-pdfs;
      mc mb --ignore-existing local/crm-avatars;
      mc anonymous set download local/crm-photos;
      exit 0;
      "

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: crm_imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_JPEG_PROGRESSIVE: "true"
      IMGPROXY_USE_S3: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      IMGPROXY_S3_ENDPOINT: http://minio:9000
    <<: *svc-network
    depends_on:
      minio:
        condition: service_healthy

  # ── Microservices ──────────────────────────────────────────────────────────
  gateway:
    image: ${DOCKER_HUB_USER}/crm-gateway:${IMAGE_TAG:-latest}
    container_name: crm_gateway
    restart: unless-stopped
    environment:
      <<: *svc-env
      PORT: 3001
      WEB_URL: https://${DOMAIN}
    <<: *svc-network
    depends_on:
      <<: *svc-depends
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  svc-auth:
    image: ${DOCKER_HUB_USER}/crm-svc-auth:${IMAGE_TAG:-latest}
    container_name: crm_svc_auth
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends

  svc-properties:
    image: ${DOCKER_HUB_USER}/crm-svc-properties:${IMAGE_TAG:-latest}
    container_name: crm_svc_properties
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy

  svc-demands:
    image: ${DOCKER_HUB_USER}/crm-svc-demands:${IMAGE_TAG:-latest}
    container_name: crm_svc_demands
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends

  svc-deals:
    image: ${DOCKER_HUB_USER}/crm-svc-deals:${IMAGE_TAG:-latest}
    container_name: crm_svc_deals
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends

  svc-matching:
    image: ${DOCKER_HUB_USER}/crm-svc-matching:${IMAGE_TAG:-latest}
    container_name: crm_svc_matching
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends

  svc-notifications:
    image: ${DOCKER_HUB_USER}/crm-svc-notifications:${IMAGE_TAG:-latest}
    container_name: crm_svc_notifications
    restart: unless-stopped
    environment:
      <<: *svc-env
    <<: *svc-network
    depends_on:
      <<: *svc-depends

  # ── Frontend ───────────────────────────────────────────────────────────────
  web:
    image: ${DOCKER_HUB_USER}/crm-web:${IMAGE_TAG:-latest}
    container_name: crm_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      NODE_ENV: production
    <<: *svc-network
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    <<: *svc-network
    depends_on:
      - web
      - gateway
      - imgproxy

  certbot:
    image: certbot/certbot
    container_name: crm_certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  crm_internal:
    driver: bridge
